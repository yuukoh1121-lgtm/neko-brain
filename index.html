<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>アハ体験！紫陽花の脳トレ</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #111;
            font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }
        #game-container {
            position: relative; width: 100vw; max-width: 450px;
            aspect-ratio: 3 / 4; box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-color: #000;
        }
        .cat-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; pointer-events: none;
        }
        #img-end { opacity: 0; }
        #hint-text {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: white; font-size: 16px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none;
        }
        #success-text {
            display: none; position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%); color: #ff0000; font-size: 64px;
            font-weight: bold; text-shadow: -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 3px 3px 0 #fff;
            pointer-events: none; z-index: 10;
        }
        #canvas-particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
        .target-area {
            position: absolute; cursor: pointer; z-index: 2;
            /* background-color: rgba(255, 0, 0, 0.3); 位置調整時はコメントアウトを外す */
        }
        /* 紫陽花のエリア（右下あたりに設定） */
        #area-flower {
            top: 60%;
            left: 60%;
            width: 35%;
            height: 30%;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <img id="img-start" class="cat-img" src="inuneko_s.png" alt="紫陽花1">
        <img id="img-end" class="cat-img" src="inuneko_e.png" alt="紫陽花2">

        <div id="area-flower" class="target-area"></div>

        <canvas id="canvas-particles"></canvas>

        <div id="hint-text">変わったところをタッチしてね！</div>
        <div id="success-text">大正解！</div>
    </div>

    <script>
        const imgEnd = document.getElementById('img-end');
        const hintText = document.getElementById('hint-text');
        const successText = document.getElementById('success-text');
        const canvas = document.getElementById('canvas-particles');
        const ctx = canvas.getContext('2d');

        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;

        let opacity = 0;
        let isCorrect = false;
        let particles = [];
        const changeSpeed = 0.0006; 

        function fadeAnimation() {
            if (!isCorrect && opacity < 1) {
                opacity += changeSpeed;
                if (opacity > 1) opacity = 1;
                imgEnd.style.opacity = opacity;
            }
            if (isCorrect) updateParticles();
            requestAnimationFrame(fadeAnimation);
        }

        function doCorrect() {
            if (isCorrect) return;
            isCorrect = true;
            hintText.style.display = 'none';
            successText.style.display = 'block';
            spawnCracker();
        }

        // 紫陽花エリアにイベント登録
        const areaFlower = document.getElementById('area-flower');
        areaFlower.addEventListener('click', doCorrect);
        areaFlower.addEventListener('touchstart', doCorrect);

        function spawnCracker() {
            const colors = ['#ff3232', '#32ff32', '#3264ff', '#ffd700', '#ff69b4', '#00ffff'];
            const centerX = canvas.width / 2;
            const centerY = canvas.height * 0.45;
            for (let i = 0; i < 120; i++) {
                particles.push({
                    x: centerX, y: centerY,
                    vx: (Math.random() - 0.5) * 12, vy: (Math.random() * -12) - 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * 8 + 5
                });
            }
        }

        function updateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.vx *= 0.98;
                if (p.y > canvas.height) { particles.splice(i, 1); continue; }
                ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
            }
        }

        fadeAnimation();
    </script>
</body>
</html>
